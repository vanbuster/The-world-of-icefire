<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Original Westeros global map placeholder</title>
  <desc id="desc">A hand-drawn parchment style placeholder map for a public fan project. It does not copy official map artwork.</desc>
  <defs>
    <radialGradient id="paper" cx="48%" cy="44%" r="76%">
      <stop offset="0" stop-color="#e1c792"/>
      <stop offset="0.58" stop-color="#caa56a"/>
      <stop offset="1" stop-color="#6d4728"/>
    </radialGradient>
    <linearGradient id="land" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#c7a16a"/>
      <stop offset="0.5" stop-color="#b98750"/>
      <stop offset="1" stop-color="#8b5a35"/>
    </linearGradient>
    <filter id="rough">
      <feTurbulence baseFrequency="0.018" numOctaves="4" seed="19" type="fractalNoise"/>
      <feColorMatrix type="saturate" values="0.22"/>
      <feBlend in="SourceGraphic" mode="multiply"/>
    </filter>
    <filter id="lifted" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="12" stdDeviation="10" flood-color="#1f130b" flood-opacity=".34"/>
    </filter>
    <linearGradient id="ridge" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#ead39e" stop-opacity=".58"/>
      <stop offset=".45" stop-color="#7c5736" stop-opacity=".58"/>
      <stop offset="1" stop-color="#2e1b10" stop-opacity=".36"/>
    </linearGradient>
    <pattern id="grain" width="120" height="120" patternUnits="userSpaceOnUse">
      <path d="M0 30 C38 12 84 48 120 20 M0 76 C42 61 69 92 120 72" fill="none" stroke="#70421f" stroke-opacity=".08" stroke-width="2"/>
      <circle cx="18" cy="90" r="1.2" fill="#3a2112" opacity=".16"/>
      <circle cx="77" cy="33" r="1.1" fill="#fff3c2" opacity=".12"/>
    </pattern>
    <symbol id="mountain" viewBox="0 0 60 42">
