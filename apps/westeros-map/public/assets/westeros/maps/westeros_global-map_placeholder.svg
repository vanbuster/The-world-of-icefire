      <path d="m22 7 2 14 7 4 M43 2l-3 21 9 15" fill="none" stroke="#e6d2a0" stroke-opacity=".42" stroke-width="2"/>
    </symbol>
    <symbol id="mini-castle" viewBox="0 0 72 72">
