    <symbol id="pine" viewBox="0 0 36 52">
      <path d="M18 4 6 21h7L3 36h12v12h6V36h12L23 21h7Z" fill="#243820" stroke="#152314" stroke-width="2"/>
    </symbol>
  </defs>
