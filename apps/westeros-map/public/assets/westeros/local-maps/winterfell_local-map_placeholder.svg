<svg xmlns="http://www.w3.org/2000/svg" width="900" height="540" viewBox="0 0 900 540" role="img" aria-labelledby="title desc">
  <title id="title">Original Winterfell local map placeholder</title>
  <desc id="desc">A parchment miniature map showing Winterfell, Wolfswood, White Knife, and Winter Town in an original style.</desc>
  <defs>
    <linearGradient id="paper" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#dec38f"/>
      <stop offset=".64" stop-color="#b98450"/>
      <stop offset="1" stop-color="#5c3b24"/>
    </linearGradient>
    <filter id="noise">
